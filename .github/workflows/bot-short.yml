name: 短期ボット（1時間ごと）

on:
  schedule:
    - cron: '0 * * * *'   # 毎時0分に実行
  workflow_dispatch:        # 手動実行ボタン

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-short-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージインストール
        run: pip install -r requirements.txt

      - name: 短期ボット実行
        run: |
          cd short
          python -u main.py
        env:
          PYTHONIOENCODING: utf-8

      - name: 結果をリポジトリに保存
        run: |
          git config user.email "actions@github.com"
          git config user.name "Auto Bot"
          git add data/
          git diff --staged --quiet || git commit -m "bot(short): update $(date -u '+%Y-%m-%d %H:%M') [skip ci]"
          git push
